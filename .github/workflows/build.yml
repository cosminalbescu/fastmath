name: Build

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build the package
        run: python -m build

      - name: Install the built wheel
        run: pip install dist/*.whl

      - name: Smoke test
        run: |
          python -c "import fastmath; print('backend:', fastmath.backend())"
          python -c "import fastmath; assert fastmath.sum_list([1.0,2.0,3.0]) == 6.0; print('sum_list OK')"
          python -c "import fastmath; assert fastmath.dot([1.0,2.0],[3.0,4.0]) == 11.0; print('dot OK')"
