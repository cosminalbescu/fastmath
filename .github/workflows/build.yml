name: Build and Publish

on:
  push:
    branches: [master]
  pull_request:
  release:
    types: [published]

jobs:
  build-wheels:
    name: Build manylinux wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheels with cibuildwheel
        uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_BUILD: "cp311-* cp312-* cp313-*"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_TEST_COMMAND: >
            python -c "import fastmath; assert fastmath.sum_list([1.0,2.0,3.0]) == 6.0; print('OK', fastmath.backend())"
      - name: Build sdist
        run: pipx run build --sdist
      - name: Collect distributions
        run: |
          mkdir -p collected
          cp wheelhouse/*.whl collected/
          cp dist/*.tar.gz collected/
          ls -la collected/
      - name: Upload distributions as artifact
        uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: collected/

  publish:
    name: Publish to TestPyPI
    needs: build-wheels
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: distributions
          path: dist/
      - name: List files to publish
        run: ls -la dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
